<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figura</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg:           #f8f8f6;
      --fg:           #1a1a1a;
      --staff-line:   #aaa;
      --note-fill:    #1a1a1a;
      --note-text:    #f8f8f6;
      --beam:         #1a1a1a;
      --chord:        #555;
      --label:        #bbb;
      --accent:       #d946a8;
      --ctrl-bg:      #efefed;
      --ctrl-border:  #d0d0cc;
      --shadow:       rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg:           #16161f;
      --fg:           #e8e8e0;
      --staff-line:   #555;
      --note-fill:    #e8e8e0;
      --note-text:    #16161f;
      --beam:         #e8e8e0;
      --chord:        #9d9d90;
      --label:        #444;
      --accent:       #f472b6;
      --ctrl-bg:      #22222e;
      --ctrl-border:  #333344;
      --shadow:       rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }
    .wordmark {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .wordmark span { color: var(--accent); }

    /* ── Controls ─────────────────────────────────────────────────────── */
    .controls {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    select {
      background: var(--ctrl-bg);
      color: var(--fg);
      border: 1px solid var(--ctrl-border);
      border-radius: 5px;
      padding: 0.32rem 0.6rem;
      font-size: 0.88rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }

    .theme-btn {
      background: var(--ctrl-bg);
      color: var(--fg);
      border: 1px solid var(--ctrl-border);
      border-radius: 5px;
      padding: 0.32rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: border-color 0.15s;
      margin-left: auto;
    }
    .theme-btn:hover { border-color: var(--accent); }

    /* ── Score ────────────────────────────────────────────────────────── */
    .song-meta {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
      padding: 0 2px;
    }
    .song-title {
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0.7;
      letter-spacing: 0.03em;
    }
    .song-key {
      font-size: 0.75rem;
      opacity: 0.4;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .score-wrap {
      width: 100%;
      max-width: 1200px;
      background: var(--bg);
      border-radius: 10px;
      box-shadow: 0 2px 18px var(--shadow);
      border: 1px solid var(--ctrl-border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .score-row {
      display: flex;
      width: 100%;
    }
    .score-row > div {
      min-width: 0;
    }
    .score-row svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Footer ───────────────────────────────────────────────────────── */
    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      opacity: 0.3;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Fi<span>g</span>ura</div>
  <button class="theme-btn" id="themeBtn">Dark</button>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label for="songSelect">Song</label>
    <select id="songSelect">
      <option value="praise">Praise The Lord Forever</option>
      <option value="waymaker">Way Maker</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label for="keySelect">Key</label>
    <select id="keySelect">
      <option value="C">C</option>
      <option value="Db">D♭</option>
      <option value="D">D</option>
      <option value="Eb">E♭</option>
      <option value="E">E</option>
      <option value="F">F</option>
      <option value="Gb">G♭</option>
      <option value="G" selected>G</option>
      <option value="Ab">A♭</option>
      <option value="A">A</option>
      <option value="Bb">B♭</option>
      <option value="B">B</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label for="formatSelect">Chords</label>
    <select id="formatSelect">
      <option value="nashville">Nashville  1, 4, 5</option>
      <option value="roman">Roman  I, IV, V</option>
      <option value="named">Named  C, F, G</option>
    </select>
  </div>
</div>

<div class="song-meta">
  <span class="song-title" id="songTitle">Praise The Lord Forever</span>
  <span class="song-key" id="keyLabel">Key of G</span>
</div>

<div class="score-wrap" id="scoreWrap"></div>

<footer>Figura · Scale Degree Notation v0.2 · PoC</footer>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════════

// Beam groups per time signature:
//   Simple time (x/4, x/2)  — one group per beat (1 division note wide)
//   Compound time (6/8 etc.) — one group per 3 division notes
function defaultBeamGrouping(ts) {
  if (ts.division === 8 && ts.beats % 3 === 0) return Array(ts.beats / 3).fill(3);
  return Array(ts.beats).fill(1);
}

// Beam fields are no longer stored on notes — the renderer derives them automatically.
const NOTE = (id, degree, base, dots, stem, tieType, tieGroup, octaveShift = 0) => ({
  id, type: 'note', degree, accidental: null, octaveShift,
  duration: { base, dots: dots ?? 0, tuplet: null },
  tie: { type: tieType ?? null, groupId: tieGroup ?? null },
  stem: stem ?? 'auto', midi: null,
});

const REST = (id, base, dots) => ({
  id, type: 'rest',
  duration: { base, dots: dots ?? 0, tuplet: null },
  tie: { type: null, groupId: null },
});

const CHORD = (degree, quality, beatOffset, accidental) => ({
  degree, accidental: accidental ?? null, quality: quality ?? 'major',
  extensions: [], bass: null, position: 'below', beatOffset,
});

const BAR = (id, idx, notes, chords, opts = {}) => {
  const ts = { beats: 4, division: 4 };
  return {
    id, index: idx,
    timeSignature: ts,
    beamGrouping: defaultBeamGrouping(ts),
    chordSymbols: chords ?? [],
    notes,
    pickup: opts.pickup ?? false,
    pickupBeats: opts.pickupBeats ?? null,
    displayOptions: { showReferenceLines: true, referenceLineStyle: 'dashed', size: 1.0 },
  };
};

const SONGS = {
  praise: {
    title: 'Praise The Lord Forever',
    key: 'G',
    keyMode: 'major',
    defaultTimeSignature: { beats: 4, division: 4 },
    bars: [
      // Bar 1: minim 6, minim 3 — chord 4
      BAR('bar-001', 0, [
        NOTE('n-101', 6, 'minim', 0, 'down'),
        NOTE('n-102', 3, 'minim', 0, 'up'),
      ], [CHORD(4, 'major', 0)]),

      // Bar 2: whole 2 — chord 5
      BAR('bar-002', 1, [
        NOTE('n-201', 2, 'whole'),
      ], [CHORD(5, 'major', 0)]),

      // Bar 3: minim 5, minim 2 — chord 3m
      BAR('bar-003', 2, [
        NOTE('n-301', 5, 'minim', 0, 'down'),
        NOTE('n-302', 2, 'minim', 0, 'up'),
      ], [CHORD(3, 'minor', 0)]),

      // Bar 4: whole 1 — chord 6m
      BAR('bar-004', 3, [
        NOTE('n-401', 1, 'whole'),
      ], [CHORD(6, 'minor', 0)]),

      // Bar 5: minim 6, minim 3 — chord 4
      BAR('bar-005', 4, [
        NOTE('n-501', 6, 'minim', 0, 'down'),
        NOTE('n-502', 3, 'minim', 0, 'up'),
      ], [CHORD(4, 'major', 0)]),

      // Bar 6: dotted crotchet 2 | quaver 1 + quaver 2 (beamed) | dotted crotchet 1 (tie start) — chord 5
      BAR('bar-006', 5, [
        NOTE('n-601', 2, 'crotchet', 1, 'up'),
        NOTE('n-602', 1, 'quaver',   0, 'up'),
        NOTE('n-603', 2, 'quaver',   0, 'up'),
        NOTE('n-604', 1, 'crotchet', 1, 'up', 'start', 'tie-x'),
      ], [CHORD(5, 'major', 0)]),

      // Bar 7: whole 1 (tie continue — end of bar 6 tie, start of bar 8 tie) — chord 1
      BAR('bar-007', 6, [
        NOTE('n-701', 1, 'whole', 0, null, 'continue', 'tie-x'),
      ], [CHORD(1, 'major', 0)]),

      // Bar 8: whole 1 (tie end — tied from bar 7)
      BAR('bar-008', 7, [
        NOTE('n-801', 1, 'whole', 0, null, 'end', 'tie-x'),
      ], []),
    ]
  },

  waymaker: {
    title: 'Way Maker',
    key: 'A',
    keyMode: 'major',
    defaultTimeSignature: { beats: 4, division: 4 },
    bars: [
      // Pickup bar: 3 quavers (1.5 beats) right-aligned at beat 2.5.
      // Beam groups: beat 2 → solo quaver; beat 3 → pair beamed together.
      BAR('wm-p', 0, [
        NOTE('wmp-1', 3, 'quaver', 0, 'up'),
        NOTE('wmp-2', 5, 'quaver', 0, 'up'),
        NOTE('wmp-3', 6, 'quaver', 0, 'up', 'start', 'wm-ta'),
      ], [], { pickup: true, pickupBeats: 1.5 }),

      // Bar 1: minim | beat3: quaver+semiq+semiq (tied at beat boundary) | beat4: semiq+quaver+semiq
      BAR('wm-1', 1, [
        NOTE('wm1-1', 6, 'minim',      0, 'down', 'end',   'wm-ta'),
        NOTE('wm1-2', 6, 'quaver',     0, 'up'),
        NOTE('wm1-3', 6, 'semiquaver', 0, 'up'),
        NOTE('wm1-4', 6, 'semiquaver', 0, 'up',   'start', 'wm-te'),
        NOTE('wm1-5', 6, 'semiquaver', 0, 'up',   'end',   'wm-te'),
        NOTE('wm1-6', 5, 'quaver',     0, 'up'),
        NOTE('wm1-7', 3, 'semiquaver', 0, 'up',   'start', 'wm-tb'),
      ], []),

      // Bar 2: minim | beat3: rest + semiq+semiq (tied at beat boundary) | beat4: quaver+semiq+semiq
      BAR('wm-2', 2, [
        NOTE('wm2-1', 3, 'minim',      0, 'up',   'end',   'wm-tb'),
        REST('wm2-r1', 'quaver', 0),
        NOTE('wm2-2', 1, 'semiquaver', 0, 'up'),
        NOTE('wm2-3', 5, 'semiquaver', 0, 'up',   'start', 'wm-tf'),
        NOTE('wm2-4', 5, 'quaver',     0, 'up',   'end',   'wm-tf'),
        NOTE('wm2-5', 1, 'semiquaver', 0, 'up'),
        NOTE('wm2-6', 2, 'semiquaver', 0, 'up',   'start', 'wm-tc'),
      ], []),

      // Bar 3: minim | beat3: rest + semiq+semiq (tied at beat boundary) | beat4: quaver+semiq+semiq(oct-1)
      BAR('wm-3', 3, [
        NOTE('wm3-1', 2, 'minim',      0, 'up',   'end',   'wm-tc'),
        REST('wm3-r1', 'quaver', 0),
        NOTE('wm3-2', 1, 'semiquaver', 0, 'up'),
        NOTE('wm3-3', 3, 'semiquaver', 0, 'up',   'start', 'wm-tg'),
        NOTE('wm3-4', 3, 'quaver',     0, 'up',   'end',   'wm-tg'),
        NOTE('wm3-5', 1, 'semiquaver', 0, 'up'),
        NOTE('wm3-6', 6, 'semiquaver', 0, 'up',   'start', 'wm-td', -1),
      ], []),

      // Bar 4 (elapsed 0–4):
      // beat 0: deg6 minim oct-1 [tie-end wm-td]             2.0 beats
      // beat 2: minim rest                                    2.0 beats
      BAR('wm-4', 4, [
        NOTE('wm4-1', 6, 'minim', 0, 'down', 'end', 'wm-td', -1),
        REST('wm4-r1', 'minim', 0),
      ], []),
    ]
  },
};

// ═══════════════════════════════════════════════════════════════════════════
// KEY / CHORD LOGIC
// ═══════════════════════════════════════════════════════════════════════════

// Major scale note names per key
const KEY_SCALES = {
  'C':  ['C','D','E','F','G','A','B'],
  'Db': ['D♭','E♭','F','G♭','A♭','B♭','C'],
  'D':  ['D','E','F♯','G','A','B','C♯'],
  'Eb': ['E♭','F','G','A♭','B♭','C','D'],
  'E':  ['E','F♯','G♯','A','B','C♯','D♯'],
  'F':  ['F','G','A','B♭','C','D','E'],
  'Gb': ['G♭','A♭','B♭','C♭','D♭','E♭','F'],
  'G':  ['G','A','B','C','D','E','F♯'],
  'Ab': ['A♭','B♭','C','D♭','E♭','F','G'],
  'A':  ['A','B','C♯','D','E','F♯','G♯'],
  'Bb': ['B♭','C','D','E♭','F','G','A'],
  'B':  ['B','C♯','D♯','E','F♯','G♯','A♯'],
};

// Semitone values per key root
const KEY_SEMI = {
  'C':0,'Db':1,'D':2,'Eb':3,'E':4,'F':5,
  'Gb':6,'G':7,'Ab':8,'A':9,'Bb':10,'B':11
};
const MAJOR_INTERVALS = [0,2,4,5,7,9,11];

function degreeToNoteName(key, degree, accidental) {
  const scale = KEY_SCALES[key] || KEY_SCALES['C'];
  const base = scale[(degree - 1) % 7];
  if (!accidental) return base;
  if (accidental === 'flat')  return base + '♭';
  if (accidental === 'sharp') return base + '♯';
  return base;
}

// Get the named note for a bass that is stored as chord-relative degree
function bassToNoteName(key, chordDeg, chordAcc, bass, format) {
  const rootSemi = KEY_SEMI[key] ?? 0;
  const scaleSemis = MAJOR_INTERVALS.map(s => (rootSemi + s) % 12);

  // Chord root semitone
  let chordRootSemi = scaleSemis[(chordDeg - 1) % 7];
  if (chordAcc === 'sharp') chordRootSemi = (chordRootSemi + 1) % 12;
  if (chordAcc === 'flat')  chordRootSemi = (chordRootSemi + 11) % 12;

  // Bass semitone = chord root + chord's own major scale interval for bass.degree
  let bassSemi = (chordRootSemi + MAJOR_INTERVALS[(bass.degree - 1) % 7]) % 12;
  if (bass.accidental === 'sharp') bassSemi = (bassSemi + 1) % 12;
  if (bass.accidental === 'flat')  bassSemi = (bassSemi + 11) % 12;

  if (format === 'named') {
    // Match bassSemi against the home key scale first for clean enharmonic
    const scale = KEY_SCALES[key] || KEY_SCALES['C'];
    for (let i = 0; i < 7; i++) {
      if (scaleSemis[i] === bassSemi) return scale[i];
    }
    // Fallback: chromatic name
    const CHROM = ['C','C♯','D','E♭','E','F','F♯','G','A♭','A','B♭','B'];
    return CHROM[bassSemi];
  }

  if (format === 'roman') {
    const ROMAN = ['I','II','III','IV','V','VI','VII'];
    const idx = scaleSemis.indexOf(bassSemi);
    return idx >= 0 ? ROMAN[idx].toLowerCase() : '?';
  }

  // nashville
  const idx = scaleSemis.indexOf(bassSemi);
  return idx >= 0 ? String(idx + 1) : '?';
}

function formatChordSymbol(chord, format, key) {
  const { degree, accidental, quality, extensions, bass } = chord;
  const ROMAN = ['','I','II','III','IV','V','VI','VII'];
  const accStr = accidental === 'flat' ? '♭' : accidental === 'sharp' ? '♯' : '';

  let root = '';
  if (format === 'nashville') {
    root = accStr + degree;
    if      (quality === 'minor')      root += 'm';
    else if (quality === 'diminished') root += '°';
    else if (quality === 'augmented')  root += '+';
    else if (quality === 'dominant')   root += '7';
  } else if (format === 'roman') {
    let num = ROMAN[degree] || String(degree);
    const lower = ['minor','diminished','halfDiminished'].includes(quality);
    if (lower) num = num.toLowerCase();
    root = accStr + num;
    if      (quality === 'diminished')     root += '°';
    else if (quality === 'augmented')      root += '+';
    else if (quality === 'halfDiminished') root += 'ø';
  } else { // named
    root = degreeToNoteName(key, degree, accidental);
    if      (quality === 'minor')      root += 'm';
    else if (quality === 'diminished') root += '°';
    else if (quality === 'augmented')  root += '+';
  }

  const extStr = (extensions || []).join('');
  let result = root + extStr;

  if (bass) {
    result += '/' + bassToNoteName(key, degree, accidental, bass, format);
  }

  return result;
}

// ═══════════════════════════════════════════════════════════════════════════
// SVG RENDERER
// ═══════════════════════════════════════════════════════════════════════════

const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

// ── Layout constants ──────────────────────────────────────────────────────
const L = {
  W:          640,   // viewBox width
  H:          210,   // viewBox height
  LEFT:         1,   // left barline — near SVG edge so adjacent bars share it seamlessly
  RIGHT:       625,  // right barline — drawn only on the final bar
  UPPER_Y:     62,   // y of upper reference line (degree 8)
  LOWER_Y:    138,   // y of lower reference line (degree 1)
  CHORD_Y:    175,   // y of chord symbol text
  STEM_LEN:    36,   // stem length in px
  NOTE_R:      12,   // notehead circle radius
  TS_X:        32,   // x centre for time signature numerals
  NOTE_START:  68,   // x where notes begin (after time sig)
  NOTE_START_NO_TS: 16, // x where notes begin when no time sig shown
};

const SPAN = L.LOWER_Y - L.UPPER_Y; // px between reference lines = 76

// Notehead geometry — tilted ellipse like standard notation
const NH = { RX: 11, RY: 7.5, ANGLE: -30 }; // rotate 30° counter-clockwise (right side up)
const NH_RAD = NH.ANGLE * Math.PI / 180;

// Returns the true rightmost (side=+1) or leftmost (side=-1) point on the
// rotated ellipse — where a vertical stem's outer edge meets the notehead edge.
function ellipseEdge(cx, cy, side) {
  const cosA = Math.cos(NH_RAD), sinA = Math.sin(NH_RAD);
  // Parameter t where dx/dt = 0 on the parametric rotated ellipse
  const t0 = Math.atan2(-NH.RY * sinA, NH.RX * cosA);
  const t  = side === 1 ? t0 : t0 + Math.PI;
  return {
    x: cx + NH.RX * Math.cos(t) * cosA - NH.RY * Math.sin(t) * sinA,
    y: cy + NH.RX * Math.cos(t) * sinA + NH.RY * Math.sin(t) * cosA,
  };
}

// Up stem (dir=-1) attaches at rightmost point; down stem at leftmost
function stemAttach(x, y, dir) {
  return ellipseEdge(x, y, dir === -1 ? 1 : -1);
}

function stemTipPt(attach, dir) {
  return { x: attach.x, y: attach.y + dir * L.STEM_LEN };
}

function noteY(degree, octaveShift) {
  // degree 1 → LOWER_Y, degree 8 → UPPER_Y, linear
  const base = L.LOWER_Y - ((degree - 1) / 7) * SPAN;
  return base - octaveShift * SPAN;
}

const BEAT_VAL = {
  whole: 4, minim: 2, crotchet: 1, quaver: 0.5, semiquaver: 0.25, demisemiquaver: 0.125
};

// Proportional beat-start layout.
// Every note sits at the x corresponding to its beat position — no centering.
// Two quavers therefore occupy the same horizontal span as one crotchet.
// areaLeft and areaWidth are passed in so chord symbols use the identical formula.
// beatOffset: the beat value that maps to areaLeft (0 for full bars; startBeat for pickup bars).
// beatRange:  the number of beats that span the full areaWidth (ts.beats for full bars; pickupBeats for pickup bars).
function layoutNotes(notes, ts, areaLeft, areaWidth, startBeat = 0, beatOffset = 0, beatRange = null) {
  const range = beatRange ?? ts.beats;
  let beat = startBeat;
  return notes.map(n => {
    const dur = BEAT_VAL[n.duration.base] * (n.duration.dots === 1 ? 1.5 : n.duration.dots === 2 ? 1.75 : 1);
    const x = areaLeft + ((beat - beatOffset) / range) * areaWidth;
    const b = beat;
    beat += dur;
    return { n, x, dur, beat: b };
  });
}

// ── Drawing helpers ───────────────────────────────────────────────────────

function drawStem(svg, ax, ay, tipX, tipY) {
  svg.appendChild(el('line', {
    x1: ax, y1: ay, x2: tipX, y2: tipY,
    stroke: 'var(--fg)', 'stroke-width': 1.6, 'stroke-linecap': 'round'
  }));
}

function drawFlag(svg, tipX, tipY, dir) {
  // Filled tapered flag:
  //   • Vertical left edge at tipX — joins the stem flush
  //   • Thick (T px) at the stem-tip end, tapering to a point at the free curl
  //   • Outer bezier arcs away; inner bezier returns close to the stem
  const W = 15, H = 30, T = 7;
  const s = dir === -1 ? 1 : -1;
  const d = [
    `M ${tipX} ${tipY}`,
    // Outer curve: sweeps wide early, then curves to free tip
    `C ${tipX+W} ${tipY+s*H*0.15} ${tipX+W*0.75} ${tipY+s*H*0.55} ${tipX+4} ${tipY+s*H}`,
    // Inner curve: taper begins at ~50% height — pulled back much earlier than before
    `C ${tipX+W*0.55} ${tipY+s*H*0.48} ${tipX+W*0.55} ${tipY+s*T*1.1} ${tipX} ${tipY+s*T}`,
    `L ${tipX} ${tipY} Z`,
  ].join(' ');
  svg.appendChild(el('path', { d, fill: 'var(--fg)' }));
}

function drawNotehead(svg, x, y, duration, label) {
  const isWhole  = duration === 'whole';
  const isMinim  = duration === 'minim';
  const isHollow = isWhole || isMinim;

  svg.appendChild(el('ellipse', {
    cx: x, cy: y, rx: NH.RX, ry: NH.RY,
    fill: isHollow ? 'var(--bg)' : 'var(--note-fill)',
    stroke: 'var(--note-fill)', 'stroke-width': 1.8,
    transform: `rotate(${NH.ANGLE},${x},${y})`
  }));

  // Degree label — always upright, centred on notehead
  const textFill = isHollow ? 'var(--fg)' : 'var(--note-text)';
  svg.appendChild(el('text', {
    x, y,
    fill: textFill,
    'font-size': label.length > 2 ? '9' : '11.5',
    'font-weight': '700',
    'font-family': 'system-ui, sans-serif',
    'text-anchor': 'middle',
    'dominant-baseline': 'central',
  }, label));
}

function degreeLabel(degree, accidental) {
  const acc = accidental === 'flat' ? '♭' : accidental === 'sharp' ? '♯' : '';
  return acc + degree;
}

function stemDir(note) {
  const eff = note.degree + (note.octaveShift ?? 0) * 7;
  // Notes outside the primary staff always stem toward the staff centre,
  // regardless of any explicit stem field in the data.
  if (eff < 0) return -1;  // below lower tonic line → stem up
  if (eff > 7) return  1;  // above upper tonic line → stem down
  if (note.stem === 'up')   return -1;
  if (note.stem === 'down') return  1;
  // auto: notes in upper half → stem down, lower half → stem up
  return eff >= 4.5 ? 1 : -1;
}

// ── VexFlow/Bravura glyph rest paths ─────────────────────────────────────
// Source: Bravura SMuFL font (via VexFlow). VF coords: y increases upward.
// 'm'→M, 'l'→L, 'b'→C (cubic bezier with 6 coords), 'z'→Z.
const GLYPH_REST4  = 'm 112 -55 b 174 -141 135 -84 156 -111 b 183 -161 177 -147 183 -158 b 181 -167 183 -163 183 -166 b 166 -174 179 -173 173 -174 b 143 -170 160 -174 148 -171 b 137 -170 141 -170 138 -170 l 125 -166 b 1 -304 50 -166 1 -233 b 168 -527 1 -376 63 -446 b 206 -540 180 -536 194 -540 b 228 -531 216 -540 226 -537 b 230 -521 229 -527 230 -524 b 207 -487 230 -508 219 -497 b 170 -435 189 -487 173 -448 b 164 -397 166 -423 164 -410 b 255 -292 164 -338 194 -292 b 369 -317 297 -292 344 -308 l 370 -318 b 382 -320 376 -320 379 -320 b 389 -314 386 -320 389 -318 b 336 -232 389 -297 351 -249 b 236 -32 281 -166 236 -112 b 236 -27 236 -30 236 -29 l 238 -17 b 238 -13 238 -16 238 -14 b 333 199 243 71 295 140 b 338 220 337 206 338 213 b 333 248 338 235 333 248 b 95 526 333 248 120 501 b 69 537 88 533 78 537 b 40 507 55 537 40 527 b 46 484 40 500 42 492 b 134 291 52 468 134 395 b 48 108 134 238 112 176 b 27 66 33 94 27 78 b 42 32 27 46 42 32 z';
const GLYPH_REST8  = 'm 193 154 b 96 251 193 207 150 251 b 0 154 43 251 0 207 b 39 81 0 124 17 98 b 117 56 62 65 89 56 b 173 66 137 56 157 60 b 225 88 193 72 206 78 b 232 89 228 89 230 89 b 239 76 238 89 239 84 b 238 60 239 72 239 66 b 104 -343 233 39 130 -248 b 145 -361 104 -360 137 -361 b 196 -347 161 -361 181 -359 b 341 161 200 -344 341 161 b 356 217 347 187 354 210 b 338 240 356 232 341 239 b 323 235 336 240 331 240 b 193 140 312 226 240 140 z';
const GLYPH_REST16 = 'm 300 160 b 202 258 300 215 256 258 b 104 160 148 258 104 215 b 219 62 104 101 164 62 b 331 94 258 62 298 75 b 341 96 336 95 338 96 b 348 86 346 96 348 94 b 265 -173 348 63 275 -151 b 194 -217 253 -200 215 -217 b 196 -203 196 -212 196 -207 b 98 -105 196 -148 151 -105 b 0 -203 43 -105 0 -148 b 115 -301 0 -262 60 -301 b 223 -271 153 -301 190 -288 b 229 -279 226 -271 229 -274 l 228 -281 b 228 -282 228 -282 228 -282 l 91 -690 b 91 -691 91 -690 91 -691 l 89 -693 b 134 -720 89 -706 102 -720 b 189 -687 176 -720 183 -703 l 356 -138 b 420 81 393 -16 420 81 b 459 226 420 81 456 207 b 461 232 459 229 461 230 b 446 248 461 240 449 246 b 431 242 439 248 435 245 b 300 145 420 233 348 147 z';
const GLYPH_REST32 = 'm 508 603 b 492 598 501 603 497 600 b 361 503 482 590 410 503 l 361 516 b 264 613 361 570 318 613 b 166 516 210 613 166 570 b 206 444 166 487 183 461 b 246 423 217 433 232 428 b 284 418 258 420 269 418 b 393 449 321 418 360 432 b 399 451 395 451 397 451 b 415 426 409 451 415 436 l 413 423 b 413 422 413 423 413 422 l 357 192 b 279 140 350 168 302 140 b 281 153 281 144 281 148 b 183 251 281 207 236 251 b 85 153 128 251 85 207 b 125 81 85 124 102 98 b 164 60 137 71 150 65 b 203 55 176 58 189 55 b 311 86 240 55 278 69 b 315 88 312 88 314 88 b 325 69 323 88 325 76 l 268 -167 b 194 -217 261 -197 216 -216 b 196 -203 196 -212 196 -207 b 98 -105 196 -148 153 -105 b 0 -203 45 -105 0 -148 b 115 -301 0 -262 60 -301 b 228 -269 154 -301 194 -288 b 232 -268 229 -268 230 -268 b 240 -276 236 -268 240 -272 b 138 -688 240 -282 141 -678 b 137 -697 137 -691 137 -694 b 176 -720 137 -708 145 -720 b 232 -690 222 -720 226 -706 b 484 436 236 -672 484 436 b 521 582 484 436 518 564 b 523 588 521 585 523 586 b 508 603 523 600 511 603 z';

// Convert a VF glyph path to an SVG d-string.
// ox/oy: SVG origin (where glyph 0,0 maps to). scale: SVG px per glyph unit.
// VF y increases upward → multiply glyph y by –1 to get SVG y.
function vfGlyph(path, ox, oy, scale) {
  const t = path.trim().split(/\s+/);
  const out = []; let i = 0;
  while (i < t.length) {
    const cmd = t[i++];
    if (cmd === 'm' || cmd === 'l') {
      out.push(`${cmd.toUpperCase()} ${(+t[i++]*scale+ox).toFixed(2)} ${(-t[i++]*scale+oy).toFixed(2)}`);
    } else if (cmd === 'b') {
      const c = [];
      for (let j = 0; j < 6; j++) { const v = +t[i++]*scale; c.push((j%2===0 ? v+ox : -v+oy).toFixed(2)); }
      out.push(`C ${c.join(' ')}`);
    } else if (cmd === 'z') { out.push('Z'); }
  }
  return out.join(' ');
}

// ── Rest symbols ──────────────────────────────────────────────────────────

function drawRest(svg, x, base, upperY, lowerY) {
  const midY = (upperY + lowerY) / 2;
  if (base === 'whole') {
    // Filled rectangle hanging from upper line
    svg.appendChild(el('rect', {
      x: x - 10, y: upperY, width: 20, height: 8,
      fill: 'var(--fg)', rx: 1
    }));
  } else if (base === 'minim') {
    // Open rectangle sitting on lower line
    svg.appendChild(el('rect', {
      x: x - 10, y: lowerY - 8, width: 20, height: 8,
      fill: 'none', stroke: 'var(--fg)', 'stroke-width': 1.6, rx: 1
    }));
  } else if (base === 'crotchet' || base === 'quaver' || base === 'semiquaver' || base === 'demisemiquaver') {
    // Bravura glyph rests. Scale: ≈ 0.053 for default SPAN=76 (≈ 3 staff-spaces tall).
    // All origins are chosen so the topmost blob sits just below the upper reference line.
    const sc  = (lowerY - upperY) * 0.0007;
    if (base === 'crotchet') {
      // Glyph y-range ≈ −537 to +537; centred at y≈0. Place glyph (165, 0) at (x, midY).
      svg.appendChild(el('path', { d: vfGlyph(GLYPH_REST4,  x - 165*sc, midY, sc), fill: 'var(--fg)' }));
    } else if (base === 'quaver') {
      // Circle centre ≈ glyph (121, 202). Place it at (x, upperY + 0.25·SPAN).
      const oy = upperY + 0.25*(lowerY-upperY) + 202*sc;
      svg.appendChild(el('path', { d: vfGlyph(GLYPH_REST8,  x - 121*sc, oy, sc), fill: 'var(--fg)' }));
    } else if (base === 'semiquaver') {
      // Upper circle centre ≈ glyph (202, 209). Place at (x, upperY + 0.25·SPAN).
      const oy = upperY + 0.25*(lowerY-upperY) + 209*sc;
      svg.appendChild(el('path', { d: vfGlyph(GLYPH_REST16, x - 202*sc, oy, sc), fill: 'var(--fg)' }));
    } else {
      // demisemiquaver: top blob centre ≈ glyph (340, 560). Place at (x, upperY + 0.2·SPAN).
      const oy = upperY + 0.20*(lowerY-upperY) + 560*sc;
      svg.appendChild(el('path', { d: vfGlyph(GLYPH_REST32, x - 340*sc, oy, sc), fill: 'var(--fg)' }));
    }
  } else {
    // fallback dash
    svg.appendChild(el('line', { x1: x-8, y1: midY, x2: x+8, y2: midY, stroke: 'var(--fg)', 'stroke-width': 2 }));
  }
}

// ── Shared tie arc drawing ────────────────────────────────────────────────
// Used by both renderBar (system-break half-arcs) and row overlay (spanning arcs).
function drawTieArc(svg, sx, ex, arcY) {
  const span = ex - sx;
  const ox = span * 0.28;
  svg.appendChild(el('path', {
    d: [
      `M ${sx} ${arcY}`,
      `C ${sx+ox} ${arcY+11} ${ex-ox} ${arcY+11} ${ex} ${arcY}`,
      `C ${ex-ox} ${arcY+5}  ${sx+ox} ${arcY+5}  ${sx} ${arcY} Z`,
    ].join(' '),
    fill: 'var(--fg)', opacity: '0.75',
  }));
}

// ── Main render function ──────────────────────────────────────────────────

function renderBar(bar, key, chordFormat, showTS = false, isLast = false, isRowEnd = false,
                   suppressTieStarts = new Set(), suppressTieEnds = new Set(), rowHeight = L.H,
                   barWidth = L.W) {
  const ts = bar.timeSignature;
  const noteStart  = showTS ? L.NOTE_START : L.NOTE_START_NO_TS;
  // Note area: fixed left margin from barline so beat-1 is always at the same x,
  // and a small right margin so the last note doesn't crowd the barline.
  const NOTE_AREA_LEFT  = noteStart + 22;
  const NOTE_AREA_RIGHT = barWidth - 18;
  const NOTE_AREA_W     = NOTE_AREA_RIGHT - NOTE_AREA_LEFT;

  // ── Dynamic y-coords based on actual note range ───────────────────────
  const { highDeg, lowDeg, extraAbove, extraBelow } = barExtent(bar);
  const SHIFT    = extraAbove;                                // shifts reference lines down for high notes
  const lUPPER_Y = L.UPPER_Y + SHIFT;
  const lLOWER_Y = L.LOWER_Y + SHIFT;
  const lCHORD_Y = L.CHORD_Y + SHIFT + extraBelow;
  // Third tonic line only when the range exceeds 4 degrees — within that,
  // floating noteheads are readable without an extra anchor line.
  const thirdTop = highDeg > 4 ? lUPPER_Y - SPAN : null;   // = L.UPPER_Y when SHIFT=SPAN
  const thirdBot = lowDeg  > 4 ? lLOWER_Y + SPAN : null;
  const barTop   = (thirdTop ?? lUPPER_Y) - 12;
  const barBot   = (thirdBot ?? lLOWER_Y) + 12;

  // Local noteY includes SHIFT
  const nY = (degree, octaveShift) => noteY(degree, octaveShift) + SHIFT;

  const svg = el('svg', { viewBox: `0 0 ${barWidth} ${rowHeight}`, xmlns: NS });

  // ── Reference lines — full bar width so adjacent bars are seamless ────
  const dash = '10 7';
  svg.appendChild(el('line', { x1: 0, y1: lUPPER_Y, x2: barWidth, y2: lUPPER_Y, stroke: 'var(--staff-line)', 'stroke-width': 1.4, 'stroke-dasharray': dash }));
  svg.appendChild(el('line', { x1: 0, y1: lLOWER_Y, x2: barWidth, y2: lLOWER_Y, stroke: 'var(--staff-line)', 'stroke-width': 1.4, 'stroke-dasharray': dash }));
  if (thirdTop !== null) {
    svg.appendChild(el('line', { x1: 0, y1: thirdTop, x2: barWidth, y2: thirdTop, stroke: 'var(--staff-line)', 'stroke-width': 1.4, 'stroke-dasharray': dash }));
  }
  if (thirdBot !== null) {
    svg.appendChild(el('line', { x1: 0, y1: thirdBot, x2: barWidth, y2: thirdBot, stroke: 'var(--staff-line)', 'stroke-width': 1.4, 'stroke-dasharray': dash }));
  }

  // Reference line labels (first bar only, tucked just inside the left barline)
  if (showTS) {
    svg.appendChild(el('text', { x: 9, y: lUPPER_Y - 5, fill: 'var(--label)', 'font-size': '9', 'text-anchor': 'middle', 'font-family': 'system-ui, sans-serif' }, '8'));
    svg.appendChild(el('text', { x: 9, y: lLOWER_Y + 13, fill: 'var(--label)', 'font-size': '9', 'text-anchor': 'middle', 'font-family': 'system-ui, sans-serif' }, '1'));
  }

  // ── Barlines ───────────────────────────────────────────────────────────
  // Left barline on every bar (at SVG left edge → seamless with preceding bar's right edge)
  svg.appendChild(el('line', { x1: L.LEFT, y1: barTop, x2: L.LEFT, y2: barBot, stroke: 'var(--fg)', 'stroke-width': 1.8 }));
  // Right barline at the end of every system row; double barline on final bar
  if (isRowEnd) {
    svg.appendChild(el('line', { x1: barWidth - 15,    y1: barTop, x2: barWidth - 15,    y2: barBot, stroke: 'var(--fg)', 'stroke-width': 1.8 }));
    if (isLast) {
      svg.appendChild(el('line', { x1: barWidth - 6, y1: barTop, x2: barWidth - 6, y2: barBot, stroke: 'var(--fg)', 'stroke-width': 6 }));
    }
  }

  // ── Time signature (first bar or time-sig change only) ────────────────
  if (showTS) {
    if (thirdBot !== null) {
      // Three-line staff (low notes): fill from topmost to bottommost
      const tsFontSize = Math.round(SPAN / 0.68);
      const tsStyle = `fill:var(--fg);font-size:${tsFontSize}px;font-weight:700;font-family:'EB Garamond',serif;text-anchor:middle;dominant-baseline:central;`;
      svg.appendChild(el('text', { x: L.TS_X, y: (lUPPER_Y + lLOWER_Y) / 2, style: tsStyle }, String(ts.beats)));
      svg.appendChild(el('text', { x: L.TS_X, y: (lLOWER_Y + thirdBot) / 2, style: tsStyle }, String(ts.division)));
    } else if (thirdTop !== null) {
      // Three-line staff (high notes)
      const tsFontSize = Math.round(SPAN / 0.68);
      const tsStyle = `fill:var(--fg);font-size:${tsFontSize}px;font-weight:700;font-family:'EB Garamond',serif;text-anchor:middle;dominant-baseline:central;`;
      svg.appendChild(el('text', { x: L.TS_X, y: (thirdTop + lUPPER_Y) / 2, style: tsStyle }, String(ts.beats)));
      svg.appendChild(el('text', { x: L.TS_X, y: (lUPPER_Y + lLOWER_Y) / 2, style: tsStyle }, String(ts.division)));
    } else {
      // Standard two-line staff
      const tsFontSize = Math.round(SPAN / 2 / 0.68);
      const tsStyle = `fill:var(--fg);font-size:${tsFontSize}px;font-weight:700;font-family:'EB Garamond',serif;text-anchor:middle;dominant-baseline:central;`;
      svg.appendChild(el('text', { x: L.TS_X, y: lUPPER_Y + SPAN * 0.25, style: tsStyle }, String(ts.beats)));
      svg.appendChild(el('text', { x: L.TS_X, y: lUPPER_Y + SPAN * 0.75, style: tsStyle }, String(ts.division)));
    }
  }

  // ── Layout notes ───────────────────────────────────────────────────────
  // For pickup bars: map the pickup beat range to the full note area so notes
  // fill the available width naturally rather than clustering at the right end.
  const isPickup   = bar.pickup && bar.pickupBeats != null;
  const startBeat  = isPickup ? ts.beats - bar.pickupBeats : 0;
  const beatOffset = isPickup ? startBeat : 0;
  const beatRange  = isPickup ? bar.pickupBeats : ts.beats;
  const laid = layoutNotes(bar.notes, ts, NOTE_AREA_LEFT, NOTE_AREA_W, startBeat, beatOffset, beatRange);

  // ── Beams (drawn first, behind noteheads) ──────────────────────────────
  const { beamGroups, beamedIds } = computeAutoBeams(laid, bar);

  for (const members of Object.values(beamGroups)) {
    if (members.length < 2) continue;
    const dir = stemDir(members[0].n);
    const bh  = 4.5;  // beam half-thickness
    const sw  = 0.8;  // half of stem stroke-width — beam overlaps stem outer edges

    // Natural stem attach-points and tips
    const memberData = members.map(({ n, x }) => {
      const ny     = nY(n.degree, n.octaveShift ?? 0);
      const attach = stemAttach(x, ny, dir);
      const tip    = stemTipPt(attach, dir);
      return { n, attach, tip };
    });

    const first = memberData[0], last = memberData[memberData.length - 1];
    const dx    = last.tip.x - first.tip.x;

    // ── Cap beam slope ──────────────────────────────────────────────────
    // Limit |dy/dx| to MAX_SLOPE to prevent extreme angles and notehead collisions.
    // The first tip is fixed; the last tip is moved inward if needed.
    const MAX_SLOPE = 0.3;
    let beamY0 = first.tip.y;
    let beamY1 = last.tip.y;
    if (dx > 0) {
      const dy = last.tip.y - first.tip.y;
      if (Math.abs(dy) > MAX_SLOPE * dx) beamY1 = beamY0 + Math.sign(dy) * MAX_SLOPE * dx;
    }

    // Beam line Y at arbitrary X — linear interpolation between the two endpoints
    const beamAtX = x => dx > 0 ? beamY0 + (beamY1 - beamY0) * (x - first.tip.x) / dx : beamY0;

    // ── Adjust stem tips to the beam line ──────────────────────────────
    // Shift the entire beam as a unit so the most-constrained note gets exactly
    // MIN_STEM, preserving the capped slope rather than distorting it per-note.
    const MIN_STEM = L.STEM_LEN;
    let beamShift = 0;
    for (const { attach, tip } of memberData) {
      const rawY = beamAtX(tip.x);
      if (dir === -1) beamShift = Math.max(beamShift, rawY - (attach.y - MIN_STEM));
      else            beamShift = Math.max(beamShift, (attach.y + MIN_STEM) - rawY);
    }
    const adjTips = memberData.map(({ tip }) => ({ x: tip.x, y: beamAtX(tip.x) + dir * beamShift }));

    // Draw stems with adjusted tips
    memberData.forEach(({ attach }, mi) => {
      svg.appendChild(el('line', {
        x1: attach.x, y1: attach.y, x2: adjTips[mi].x, y2: adjTips[mi].y,
        stroke: 'var(--fg)', 'stroke-width': 1.6, 'stroke-linecap': 'round'
      }));
    });

    // Primary beam parallelogram — vertical end caps flush with outer stem edges
    const fa = adjTips[0], la = adjTips[adjTips.length - 1];
    svg.appendChild(el('path', {
      d: `M ${fa.x-sw} ${fa.y-bh} L ${la.x+sw} ${la.y-bh} L ${la.x+sw} ${la.y+bh} L ${fa.x-sw} ${fa.y+bh} Z`,
      fill: 'var(--beam)',
    }));

    // ── Secondary beams ─────────────────────────────────────────────────
    // All secondary beams are parallelograms at the same slope as the primary beam.
    // Full span between consecutive semiquavers; slope-matching stub for isolated ones.
    const beamGap = bh * 2 + 2;       // distance between primary and secondary centres
    const stubW   = 14;                // stub width for an isolated semiquaver
    // Secondary beam follows the final adjusted primary beam (fa→la), not the pre-MIN_STEM capped line
    const fdx = la.x - fa.x;
    const finalBeamAtX = x => fdx > 0 ? fa.y + (la.y - fa.y) * (x - fa.x) / fdx : fa.y;
    const secAtX  = x => finalBeamAtX(x) - dir * beamGap;

    let si = 0;
    while (si < memberData.length) {
      if (memberData[si].n.duration.base !== 'semiquaver') { si++; continue; }
      let ei = si;
      while (ei + 1 < memberData.length && memberData[ei + 1].n.duration.base === 'semiquaver') ei++;

      if (ei > si) {
        // Full secondary beam spanning the consecutive semiquaver run
        const x0 = adjTips[si].x, x1 = adjTips[ei].x;
        const sy0 = secAtX(x0),   sy1 = secAtX(x1);
        svg.appendChild(el('path', {
          d: `M ${x0-sw} ${sy0-bh} L ${x1+sw} ${sy1-bh} L ${x1+sw} ${sy1+bh} L ${x0-sw} ${sy0+bh} Z`,
          fill: 'var(--beam)',
        }));
        si = ei + 1;
      } else {
        // Isolated semiquaver: stub parallelogram at primary slope, toward group centre
        const tipX  = adjTips[si].x;
        const atEnd = si === memberData.length - 1 && si > 0;
        const x0 = atEnd ? tipX - stubW : tipX;
        const x1 = atEnd ? tipX        : tipX + stubW;
        const sy0 = secAtX(x0), sy1 = secAtX(x1);
        svg.appendChild(el('path', {
          d: `M ${x0-sw} ${sy0-bh} L ${x1+sw} ${sy1-bh} L ${x1+sw} ${sy1+bh} L ${x0-sw} ${sy0+bh} Z`,
          fill: 'var(--beam)',
        }));
        si++;
      }
    }
  }

  // ── Notes and rests ────────────────────────────────────────────────────
  laid.forEach(({ n, x }) => {
    if (n.type === 'rest') {
      drawRest(svg, x, n.duration.base, lUPPER_Y, lLOWER_Y);
      return;
    }

    const y   = nY(n.degree, n.octaveShift ?? 0);
    const dir = stemDir(n);
    const lbl = degreeLabel(n.degree, n.accidental);
    const base = n.duration.base;
    const isBeamed = beamedIds.has(n.id);

    // Notehead
    drawNotehead(svg, x, y, base, lbl);

    // Stem (skip for whole notes and beamed notes — beamed stems drawn above)
    if (base !== 'whole' && !isBeamed) {
      const attach = stemAttach(x, y, dir);
      const tip    = stemTipPt(attach, dir);
      drawStem(svg, attach.x, attach.y, tip.x, tip.y);
      // Flag for unbeamed quaver/semiquaver
      if (base === 'quaver' || base === 'semiquaver') {
        drawFlag(svg, tip.x, tip.y, dir);
        if (base === 'semiquaver') {
          const fs = dir === -1 ? 8 : -8;  // toward notehead
          drawFlag(svg, tip.x, tip.y + fs, dir);
        }
      }
    }

    // Augmentation dots
    if (n.duration.dots > 0) {
      for (let d = 0; d < n.duration.dots; d++) {
        svg.appendChild(el('circle', { cx: x + NH.RX + 6 + d * 7, cy: y - 3, r: 2.5, fill: 'var(--fg)' }));
      }
    }

    // Ledger-line hint for notes outside the staff (subtle accent line)
    if ((n.octaveShift ?? 0) !== 0) {
      const refY = (n.octaveShift ?? 0) > 0 ? lUPPER_Y : lLOWER_Y;
      svg.appendChild(el('line', {
        x1: x - 18, y1: refY, x2: x + 18, y2: refY,
        stroke: 'var(--accent)', 'stroke-width': 1.2,
        'stroke-dasharray': '4 3', opacity: '0.55'
      }));
    }
  });

  // ── Tie arcs ───────────────────────────────────────────────────────────
  // First pass: detect within-bar ties (start and end both present in this bar)
  // and draw them directly between the two note x-positions.
  const _tieStartsInBar = new Map();  // groupId → {x, arcY}
  const _withinBarTies  = new Set();  // groupIds fully resolved within this bar
  laid.forEach(({ n, x }) => {
    if (n.type === 'rest' || !n.tie?.type) return;
    const tt = n.tie.type, gid = n.tie.groupId;
    const arcY = nY(n.degree, n.octaveShift ?? 0) + NH.RY + 5;
    if (tt === 'start') {
      _tieStartsInBar.set(gid, { x, arcY });
    } else if (tt === 'end' && _tieStartsInBar.has(gid)) {
      const { x: sx, arcY: ay } = _tieStartsInBar.get(gid);
      drawTieArc(svg, sx, x, ay);
      _withinBarTies.add(gid);
    }
  });
  // Second pass: system-edge half-arcs for cross-barline ties.
  // 'start'    → arc from note to SVG right edge
  // 'end'      → arc from SVG left edge to note
  // 'continue' → both (mid-chain: ties in AND out across barlines)
  // Same-row spanning arcs are drawn on a row overlay; relevant half-arcs
  // are suppressed via suppressTieStarts / suppressTieEnds.
  laid.forEach(({ n, x }) => {
    if (n.type === 'rest' || !n.tie?.type) return;
    const tt  = n.tie.type;
    const gid = n.tie.groupId;
    if (_withinBarTies.has(gid)) return;  // already drawn above
    const arcY = nY(n.degree, n.octaveShift ?? 0) + NH.RY + 5;
    if ((tt === 'start' || tt === 'continue') && !suppressTieStarts.has(gid)) {
      drawTieArc(svg, x, barWidth - 2, arcY);
    }
    if ((tt === 'end' || tt === 'continue') && !suppressTieEnds.has(gid)) {
      drawTieArc(svg, 2, x, arcY);
    }
  });

  // ── Chord symbols ──────────────────────────────────────────────────────
  const chordFont = chordFormat === 'roman' ? "'EB Garamond', serif" : "system-ui, sans-serif";
  (bar.chordSymbols || []).forEach(chord => {
    // Same formula as note layout: chord.beatOffset relative to beatOffset, spanning beatRange.
    const chordX = NOTE_AREA_LEFT + (chord.beatOffset / beatRange) * NOTE_AREA_W;
    svg.appendChild(el('text', {
      x: chordX, y: lCHORD_Y,
      fill: 'var(--chord)',
      'font-size': '18', 'font-weight': '700', 'font-style': 'normal',
      'font-family': chordFont, 'text-anchor': 'middle',
    }, formatChordSymbol(chord, chordFormat, key)));
  });

  return svg;
}

// ═══════════════════════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════════════════════

// Minimum viewBox-unit width for a bar based on its densest note spacing.
// MIN_NOTE_GAP viewBox units between note centres is screen-size independent because
// physical note size scales by the same factor (containerWidth / L.W).
// showTS is needed for the correct left margin; pickup bars use their pickupBeats range.
function barNaturalWidthVB(bar, showTS) {
  const MIN_NOTE_GAP = 24; // viewBox units — ≈ 1.1× notehead diameter (2×NH.RX = 22)
  const ts = bar.timeSignature;
  const isPickup = bar.pickup && bar.pickupBeats != null;
  const beatRange = isPickup ? bar.pickupBeats : ts.beats;
  const noteAreaLeft = (showTS ? L.NOTE_START : L.NOTE_START_NO_TS) + 22;

  let minBeatGap = beatRange;
  let prevBeat   = null;
  let beat       = isPickup ? ts.beats - bar.pickupBeats : 0;
  for (const n of bar.notes) {
    const dur = BEAT_VAL[n.duration.base] * (n.duration.dots === 1 ? 1.5 : n.duration.dots === 2 ? 1.75 : 1);
    if (n.type !== 'rest') {
      if (prevBeat !== null) minBeatGap = Math.min(minBeatGap, beat - prevBeat);
      prevBeat = beat;
    }
    beat += dur;
  }

  const noteAreaVB = prevBeat === null ? MIN_NOTE_GAP : MIN_NOTE_GAP * beatRange / minBeatGap;
  return noteAreaLeft + noteAreaVB + 18;
}

// Note x positions for a bar — same formula as the layout inside renderBar.
function barNotePositions(bar, showTS, barWidth = L.W) {
  const noteStart = showTS ? L.NOTE_START : L.NOTE_START_NO_TS;
  const NOTE_AREA_LEFT  = noteStart + 22;
  const NOTE_AREA_RIGHT = barWidth - 18;
  const NOTE_AREA_W     = NOTE_AREA_RIGHT - NOTE_AREA_LEFT;
  const isPickup   = bar.pickup && bar.pickupBeats != null;
  const startBeat  = isPickup ? bar.timeSignature.beats - bar.pickupBeats : 0;
  const beatOffset = isPickup ? startBeat : 0;
  const beatRange  = isPickup ? bar.pickupBeats : bar.timeSignature.beats;
  return layoutNotes(bar.notes, bar.timeSignature, NOTE_AREA_LEFT, NOTE_AREA_W, startBeat, beatOffset, beatRange);
}

// Auto-compute beam groups for a bar from its beamGrouping and time signature.
// Returns { beamGroups: {id → [{n,x}]}, beamedIds: Set<noteId> }
// Rules: quaver/semiquaver/demisemiquaver notes within the same beam-group window
// are beamed together, but a rest or longer note breaks the run.
function computeAutoBeams(laid, bar) {
  const ts     = bar.timeSignature;
  const divVal = 4 / ts.division;  // crotchet value of one division note

  // Build beam-group beat windows
  let pos = 0;
  const windows = bar.beamGrouping.map(size => {
    const w = { start: pos, end: pos + size * divVal };
    pos += size * divVal;
    return w;
  });

  const beamGroups = {};
  const beamedIds  = new Set();
  let counter = 0;

  for (const win of windows) {
    const inWin = laid.filter(({ beat: b }) => b >= win.start && b < win.end);
    let run = [];
    for (const { n, x } of inWin) {
      const beamable = n.type !== 'rest' &&
        (n.duration.base === 'quaver' || n.duration.base === 'semiquaver' || n.duration.base === 'demisemiquaver');
      if (beamable) {
        run.push({ n, x });
      } else {
        // Crotchet, minim, rest, etc. — break the current run
        if (run.length >= 2) {
          const gid = `_bg${counter++}`;
          beamGroups[gid] = run;
          run.forEach(({ n: m }) => beamedIds.add(m.id));
        }
        run = [];
      }
    }
    if (run.length >= 2) {
      const gid = `_bg${counter++}`;
      beamGroups[gid] = run;
      run.forEach(({ n: m }) => beamedIds.add(m.id));
    }
  }

  return { beamGroups, beamedIds };
}

// Compute degrees of extension outside the primary two-line staff, and the
// proportional extra viewBox space those notes need.
// highDeg = degrees above the upper tonic line; lowDeg = degrees below the lower.
// A full SPAN (+ third tonic line) is used only when extension exceeds 4 degrees;
// within that, space is proportional so height scales smoothly with actual range.
function barExtent(bar) {
  let highDeg = 0, lowDeg = 0;
  for (const n of bar.notes) {
    if (n.type === 'rest') continue;
    const pos = (n.degree - 1) + 7 * (n.octaveShift ?? 0); // 0 = lower line, 7 = upper line
    if (pos > 7) highDeg = Math.max(highDeg, pos - 7);
    if (pos < 0) lowDeg  = Math.max(lowDeg, -pos);
  }
  const extraAbove = highDeg > 4 ? SPAN : Math.ceil(highDeg / 7 * SPAN);
  const extraBelow = lowDeg  > 4 ? SPAN : Math.ceil(lowDeg  / 7 * SPAN);
  return { highDeg, lowDeg, extraAbove, extraBelow };
}

function barSVGHeight(bar) {
  const { extraAbove, extraBelow } = barExtent(bar);
  return L.H + extraAbove + extraBelow;
}

// Group bars into system rows using geometry-based minimum bar widths.
// Each bar's minimum physical width is derived from the densest note gap in the bar,
// ensuring no noteheads overlap at any screen size.  Pickup bars have no minimum-
// width floor so they collapse to their content width and share a row with bar 1.
function computeRows(bars, containerWidth) {
  const MIN_BAR_WIDTH = 160; // physical px floor for non-pickup bars

  // Pre-compute which bars display a time signature (needed for left-margin in barNaturalWidthVB)
  const firstNonPickupIdx = bars.findIndex(b => !b.pickup);
  const barShowTS = bars.map((bar, i) => {
    if (bar.pickup) return false;
    if (i === firstNonPickupIdx) return true;
    const prev = bars[i - 1];
    return !prev ||
      bar.timeSignature.beats    !== prev.timeSignature.beats ||
      bar.timeSignature.division !== prev.timeSignature.division;
  });

  const minWidths = bars.map((bar, i) => {
    const natPx = barNaturalWidthVB(bar, barShowTS[i]) * containerWidth / L.W;
    return bar.pickup && bar.pickupBeats != null ? natPx : Math.max(MIN_BAR_WIDTH, natPx);
  });

  const rows = [];
  let row = [], rowW = 0;
  for (let i = 0; i < bars.length; i++) {
    if (row.length > 0 && rowW + minWidths[i] > containerWidth) {
      rows.push(row);
      row = [];
      rowW = 0;
    }
    row.push(i);
    rowW += minWidths[i];
  }
  if (row.length) rows.push(row);
  return rows;
}

// ═══════════════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════════════

let state = { song: 'praise', key: 'G', format: 'nashville', theme: 'light' };

function render() {
  const DOC = SONGS[state.song];
  const wrap = document.getElementById('scoreWrap');
  wrap.innerHTML = '';

  const containerWidth = wrap.clientWidth || window.innerWidth || 640;
  const rows = computeRows(DOC.bars, containerWidth);
  const maxBarsInRow   = Math.max(...rows.map(r => r.length));
  const targetBarWidth = containerWidth / maxBarsInRow;

  // Time-signature display is a piece-level decision:
  // pickup bars never show TS; first non-pickup bar always shows TS; TS changes show too.
  const firstNonPickupIdx = DOC.bars.findIndex(b => !b.pickup);
  const barShowTS = DOC.bars.map((bar, barIdx) => {
    if (bar.pickup) return false;
    if (barIdx === firstNonPickupIdx) return true;
    const prev = DOC.bars[barIdx - 1];
    return !prev ||
      bar.timeSignature.beats    !== prev.timeSignature.beats ||
      bar.timeSignature.division !== prev.timeSignature.division;
  });

  // Minimum flex-weight for non-pickup bars (≈ 160 physical px in viewBox units).
  const minFW = 160 * L.W / containerWidth;

  rows.forEach((rowIndices, rowIdx) => {
    const barsInRow = rowIndices.length;
    const isLastRow = rowIdx === rows.length - 1;
    const fillRatio = barsInRow / maxBarsInRow;
    const stretch   = !isLastRow || fillRatio >= 0.8;

    // showTS per bar in this row (piece-level)
    const showTSArr = rowIndices.map(i => barShowTS[i]);

    // Per-bar flex weights (viewBox units): geometry-derived, floor for non-pickup.
    // Since barWidth_i = L.W × fw_i/totalFlex, note scale = containerWidth/L.W
    // is the same across ALL rows and ALL bar widths.
    const flexWeights = rowIndices.map((barIdx, p) => {
      const bar = DOC.bars[barIdx];
      const fw  = barNaturalWidthVB(bar, showTSArr[p]);
      return bar.pickup && bar.pickupBeats != null ? fw : Math.max(minFW, fw);
    });
    const totalFlex = flexWeights.reduce((a, b) => a + b, 0);

    // Per-bar viewBox widths — proportional to flex weight.
    // Stretch:     fills full container.   barWidth_i = L.W × fw_i / totalFlex
    // Non-stretch: pins to targetBarWidth. barWidth_i = L.W × fw_i / totalFlex × barsInRow / maxBarsInRow
    const barWidths = stretch
      ? flexWeights.map(fw => L.W * fw / totalFlex)
      : flexWeights.map(fw => L.W * fw / totalFlex * barsInRow / maxBarsInRow);

    // Row height: tallest bar in this row
    const rowH = Math.max(...rowIndices.map(i => barSVGHeight(DOC.bars[i])));

    // Cumulative viewBox x-offsets for spanning-tie arc x-coordinates
    const cumX = [0];
    for (let p = 0; p < barWidths.length - 1; p++) cumX.push(cumX[p] + barWidths[p]);

    // Detect ties between adjacent bars within this row.
    const suppressStarts = {};
    const suppressEnds   = {};
    const spanningTies   = [];

    for (let p = 0; p < rowIndices.length - 1; p++) {
      const barA  = DOC.bars[rowIndices[p]];
      const barB  = DOC.bars[rowIndices[p + 1]];
      const laidA = barNotePositions(barA, showTSArr[p],     barWidths[p]);
      const laidB = barNotePositions(barB, showTSArr[p + 1], barWidths[p + 1]);

      laidA.forEach(({ n, x: sx }) => {
        const tt = n.tie?.type;
        if (tt !== 'start' && tt !== 'continue') return;
        const found = laidB.find(({ n: m }) =>
          (m.tie?.type === 'end' || m.tie?.type === 'continue') &&
          m.tie?.groupId === n.tie.groupId
        );
        if (!found) return;
        const gid = n.tie.groupId;
        (suppressStarts[rowIndices[p]]     ??= new Set()).add(gid);
        (suppressEnds[rowIndices[p + 1]]   ??= new Set()).add(gid);
        const shiftA = barExtent(barA).extraAbove;
        const arcY   = noteY(n.degree, n.octaveShift ?? 0) + shiftA + NH.RY + 5;
        spanningTies.push({ sx: cumX[p] + sx, ex: cumX[p + 1] + found.x, arcY });
      });
    }

    const rowEl = document.createElement('div');
    rowEl.className = 'score-row';
    if (spanningTies.length) rowEl.style.position = 'relative';

    rowIndices.forEach((barIdx, posInRow) => {
      const bar      = DOC.bars[barIdx];
      const isLast   = barIdx === DOC.bars.length - 1;
      const isRowEnd = posInRow === rowIndices.length - 1;

      const barWrap = document.createElement('div');
      if (stretch) {
        barWrap.style.cssText = `flex:${flexWeights[posInRow]}; min-width:0;`;
      } else {
        const physW = flexWeights[posInRow] / totalFlex * barsInRow * targetBarWidth;
        barWrap.style.cssText = `flex:0 0 ${physW}px; width:${physW}px;`;
      }
      barWrap.appendChild(
        renderBar(bar, state.key, state.format, showTSArr[posInRow], isLast, isRowEnd,
          suppressStarts[barIdx] ?? new Set(),
          suppressEnds[barIdx]   ?? new Set(),
          rowH, barWidths[posInRow])
      );
      rowEl.appendChild(barWrap);
    });

    // Overlay SVG for spanning tie arcs (same-row cross-barline ties).
    if (spanningTies.length) {
      const totalVBWidth    = barWidths.reduce((a, b) => a + b, 0);
      const overlayWidthPct = stretch
        ? '100%'
        : `${(barsInRow / maxBarsInRow * 100).toFixed(4)}%`;
      const overlay = el('svg', {
        viewBox: `0 0 ${totalVBWidth} ${rowH}`,
        xmlns: NS,
        style: `position:absolute;top:0;left:0;width:${overlayWidthPct};pointer-events:none;`,
      });
      spanningTies.forEach(({ sx, ex, arcY }) => drawTieArc(overlay, sx, ex, arcY));
      rowEl.appendChild(overlay);
    }

    wrap.appendChild(rowEl);
  });

  document.getElementById('songTitle').textContent = DOC.title;
  document.getElementById('keyLabel').textContent = `Key of ${state.key}`;
}

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('songSelect').addEventListener('change', e => {
  state.song = e.target.value;
  // Also update key selector to match the song's default key
  const doc = SONGS[state.song];
  state.key = doc.key;
  document.getElementById('keySelect').value = doc.key;
  render();
});

document.getElementById('keySelect').addEventListener('change', e => {
  state.key = e.target.value;
  render();
});

document.getElementById('formatSelect').addEventListener('change', e => {
  state.format = e.target.value;
  render();
});

document.getElementById('themeBtn').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.body.dataset.theme = state.theme === 'dark' ? 'dark' : '';
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? 'Light' : 'Dark';
});

// ── Boot ───────────────────────────────────────────────────────────────────
render();

// Re-layout when container width changes (portrait↔landscape, resize, etc.)
let _resizeTimer;
new ResizeObserver(() => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(render, 60);
}).observe(document.getElementById('scoreWrap'));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
