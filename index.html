<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figura</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg:           #f8f8f6;
      --fg:           #1a1a1a;
      --staff-line:   #aaa;
      --note-fill:    #1a1a1a;
      --note-text:    #f8f8f6;
      --beam:         #1a1a1a;
      --chord:        #555;
      --label:        #bbb;
      --accent:       #d946a8;
      --ctrl-bg:      #efefed;
      --ctrl-border:  #d0d0cc;
      --shadow:       rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg:           #16161f;
      --fg:           #e8e8e0;
      --staff-line:   #555;
      --note-fill:    #e8e8e0;
      --note-text:    #16161f;
      --beam:         #e8e8e0;
      --chord:        #9d9d90;
      --label:        #444;
      --accent:       #f472b6;
      --ctrl-bg:      #22222e;
      --ctrl-border:  #333344;
      --shadow:       rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }
    .wordmark {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .wordmark span { color: var(--accent); }

    /* ── Controls ─────────────────────────────────────────────────────── */
    .controls {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    select {
      background: var(--ctrl-bg);
      color: var(--fg);
      border: 1px solid var(--ctrl-border);
      border-radius: 5px;
      padding: 0.32rem 0.6rem;
      font-size: 0.88rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }

    .theme-btn {
      background: var(--ctrl-bg);
      color: var(--fg);
      border: 1px solid var(--ctrl-border);
      border-radius: 5px;
      padding: 0.32rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: border-color 0.15s;
      margin-left: auto;
    }
    .theme-btn:hover { border-color: var(--accent); }

    /* ── Score ────────────────────────────────────────────────────────── */
    .song-meta {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
      padding: 0 2px;
    }
    .song-title {
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0.7;
      letter-spacing: 0.03em;
    }
    .song-key {
      font-size: 0.75rem;
      opacity: 0.4;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .score-wrap {
      width: 100%;
      max-width: 1200px;
      background: var(--bg);
      border-radius: 10px;
      box-shadow: 0 2px 18px var(--shadow);
      border: 1px solid var(--ctrl-border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .score-row {
      display: flex;
      width: 100%;
    }
    .score-row > div {
      flex: 1;
      min-width: 0;
    }
    .score-row svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Footer ───────────────────────────────────────────────────────── */
    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      opacity: 0.3;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Fi<span>g</span>ura</div>
  <button class="theme-btn" id="themeBtn">Dark</button>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label for="keySelect">Key</label>
    <select id="keySelect">
      <option value="C">C</option>
      <option value="Db">D♭</option>
      <option value="D">D</option>
      <option value="Eb">E♭</option>
      <option value="E">E</option>
      <option value="F">F</option>
      <option value="Gb">G♭</option>
      <option value="G" selected>G</option>
      <option value="Ab">A♭</option>
      <option value="A">A</option>
      <option value="Bb">B♭</option>
      <option value="B">B</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label for="formatSelect">Chords</label>
    <select id="formatSelect">
      <option value="nashville">Nashville  1, 4, 5</option>
      <option value="roman">Roman  I, IV, V</option>
      <option value="named">Named  C, F, G</option>
    </select>
  </div>
</div>

<div class="song-meta">
  <span class="song-title" id="songTitle">Praise The Lord Forever</span>
  <span class="song-key" id="keyLabel">Key of G</span>
</div>

<div class="score-wrap" id="scoreWrap"></div>

<footer>Figura · Scale Degree Notation v0.2 · PoC</footer>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════════

const NOTE = (id, degree, base, dots, stem, beamType, beamGroup, tieType, tieGroup) => ({
  id, type: 'note', degree, accidental: null, octaveShift: 0,
  duration: { base, dots: dots ?? 0, tuplet: null },
  tie: { type: tieType ?? null, groupId: tieGroup ?? null },
  beam: { type: beamType ?? null, groupId: beamGroup ?? null },
  stem: stem ?? 'auto', midi: null,
});

const CHORD = (degree, quality, beatOffset, accidental) => ({
  degree, accidental: accidental ?? null, quality: quality ?? 'major',
  extensions: [], bass: null, position: 'below', beatOffset,
});

const BAR = (id, idx, notes, chords) => ({
  id, index: idx,
  timeSignature: { beats: 4, division: 4 },
  beamGrouping: [2, 2],
  chordSymbols: chords ?? [],
  notes,
  displayOptions: { showReferenceLines: true, referenceLineStyle: 'dashed', size: 1.0 },
});

const DOC = {
  title: 'Praise The Lord Forever',
  key: 'G',
  keyMode: 'major',
  defaultTimeSignature: { beats: 4, division: 4 },
  bars: [
    // Bar 1: minim 6, minim 3 — chord 4
    BAR('bar-001', 0, [
      NOTE('n-101', 6, 'minim', 0, 'down'),
      NOTE('n-102', 3, 'minim', 0, 'up'),
    ], [CHORD(4, 'major', 0)]),

    // Bar 2: whole 2 — chord 5
    BAR('bar-002', 1, [
      NOTE('n-201', 2, 'whole'),
    ], [CHORD(5, 'major', 0)]),

    // Bar 3: minim 5, minim 2 — chord 3m
    BAR('bar-003', 2, [
      NOTE('n-301', 5, 'minim', 0, 'down'),
      NOTE('n-302', 2, 'minim', 0, 'up'),
    ], [CHORD(3, 'minor', 0)]),

    // Bar 4: whole 1 — chord 6m (wait - degree 6m... actually it's 6m)
    BAR('bar-004', 3, [
      NOTE('n-401', 1, 'whole'),
    ], [CHORD(6, 'minor', 0)]),

    // Bar 5: minim 6, minim 3 — chord 4
    BAR('bar-005', 4, [
      NOTE('n-501', 6, 'minim', 0, 'down'),
      NOTE('n-502', 3, 'minim', 0, 'up'),
    ], [CHORD(4, 'major', 0)]),

    // Bar 6: dotted crotchet 2 | quaver 1 + quaver 2 (beamed) | dotted crotchet 1 (tie start) — chord 5
    BAR('bar-006', 5, [
      NOTE('n-601', 2, 'crotchet', 1, 'up'),
      NOTE('n-602', 1, 'quaver',   0, 'up'),
      NOTE('n-603', 2, 'quaver',   0, 'up'),
      NOTE('n-604', 1, 'crotchet', 1, 'up', null, null, 'start', 'tie-x'),
    ], [CHORD(5, 'major', 0)]),

    // Bar 7: whole 1 (tie end) — chord 1
    BAR('bar-007', 6, [
      NOTE('n-701', 1, 'whole', 0, null, null, null, 'end', 'tie-x'),
    ], [CHORD(1, 'major', 0)]),
  ]
};

// ═══════════════════════════════════════════════════════════════════════════
// KEY / CHORD LOGIC
// ═══════════════════════════════════════════════════════════════════════════

// Major scale note names per key
const KEY_SCALES = {
  'C':  ['C','D','E','F','G','A','B'],
  'Db': ['D♭','E♭','F','G♭','A♭','B♭','C'],
  'D':  ['D','E','F♯','G','A','B','C♯'],
  'Eb': ['E♭','F','G','A♭','B♭','C','D'],
  'E':  ['E','F♯','G♯','A','B','C♯','D♯'],
  'F':  ['F','G','A','B♭','C','D','E'],
  'Gb': ['G♭','A♭','B♭','C♭','D♭','E♭','F'],
  'G':  ['G','A','B','C','D','E','F♯'],
  'Ab': ['A♭','B♭','C','D♭','E♭','F','G'],
  'A':  ['A','B','C♯','D','E','F♯','G♯'],
  'Bb': ['B♭','C','D','E♭','F','G','A'],
  'B':  ['B','C♯','D♯','E','F♯','G♯','A♯'],
};

// Semitone values per key root
const KEY_SEMI = {
  'C':0,'Db':1,'D':2,'Eb':3,'E':4,'F':5,
  'Gb':6,'G':7,'Ab':8,'A':9,'Bb':10,'B':11
};
const MAJOR_INTERVALS = [0,2,4,5,7,9,11];

function degreeToNoteName(key, degree, accidental) {
  const scale = KEY_SCALES[key] || KEY_SCALES['C'];
  const base = scale[(degree - 1) % 7];
  if (!accidental) return base;
  if (accidental === 'flat')  return base + '♭';
  if (accidental === 'sharp') return base + '♯';
  return base;
}

// Get the named note for a bass that is stored as chord-relative degree
function bassToNoteName(key, chordDeg, chordAcc, bass, format) {
  const rootSemi = KEY_SEMI[key] ?? 0;
  const scaleSemis = MAJOR_INTERVALS.map(s => (rootSemi + s) % 12);

  // Chord root semitone
  let chordRootSemi = scaleSemis[(chordDeg - 1) % 7];
  if (chordAcc === 'sharp') chordRootSemi = (chordRootSemi + 1) % 12;
  if (chordAcc === 'flat')  chordRootSemi = (chordRootSemi + 11) % 12;

  // Bass semitone = chord root + chord's own major scale interval for bass.degree
  let bassSemi = (chordRootSemi + MAJOR_INTERVALS[(bass.degree - 1) % 7]) % 12;
  if (bass.accidental === 'sharp') bassSemi = (bassSemi + 1) % 12;
  if (bass.accidental === 'flat')  bassSemi = (bassSemi + 11) % 12;

  if (format === 'named') {
    // Match bassSemi against the home key scale first for clean enharmonic
    const scale = KEY_SCALES[key] || KEY_SCALES['C'];
    for (let i = 0; i < 7; i++) {
      if (scaleSemis[i] === bassSemi) return scale[i];
    }
    // Fallback: chromatic name
    const CHROM = ['C','C♯','D','E♭','E','F','F♯','G','A♭','A','B♭','B'];
    return CHROM[bassSemi];
  }

  if (format === 'roman') {
    const ROMAN = ['I','II','III','IV','V','VI','VII'];
    const idx = scaleSemis.indexOf(bassSemi);
    return idx >= 0 ? ROMAN[idx].toLowerCase() : '?';
  }

  // nashville
  const idx = scaleSemis.indexOf(bassSemi);
  return idx >= 0 ? String(idx + 1) : '?';
}

function formatChordSymbol(chord, format, key) {
  const { degree, accidental, quality, extensions, bass } = chord;
  const ROMAN = ['','I','II','III','IV','V','VI','VII'];
  const accStr = accidental === 'flat' ? '♭' : accidental === 'sharp' ? '♯' : '';

  let root = '';
  if (format === 'nashville') {
    root = accStr + degree;
    if      (quality === 'minor')      root += 'm';
    else if (quality === 'diminished') root += '°';
    else if (quality === 'augmented')  root += '+';
    else if (quality === 'dominant')   root += '7';
  } else if (format === 'roman') {
    let num = ROMAN[degree] || String(degree);
    const lower = ['minor','diminished','halfDiminished'].includes(quality);
    if (lower) num = num.toLowerCase();
    root = accStr + num;
    if      (quality === 'diminished')     root += '°';
    else if (quality === 'augmented')      root += '+';
    else if (quality === 'halfDiminished') root += 'ø';
  } else { // named
    root = degreeToNoteName(key, degree, accidental);
    if      (quality === 'minor')      root += 'm';
    else if (quality === 'diminished') root += '°';
    else if (quality === 'augmented')  root += '+';
  }

  const extStr = (extensions || []).join('');
  let result = root + extStr;

  if (bass) {
    result += '/' + bassToNoteName(key, degree, accidental, bass, format);
  }

  return result;
}

// ═══════════════════════════════════════════════════════════════════════════
// SVG RENDERER
// ═══════════════════════════════════════════════════════════════════════════

const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

// ── Layout constants ──────────────────────────────────────────────────────
const L = {
  W:          640,   // viewBox width
  H:          210,   // viewBox height
  LEFT:         1,   // left barline — near SVG edge so adjacent bars share it seamlessly
  RIGHT:       625,  // right barline — drawn only on the final bar
  UPPER_Y:     62,   // y of upper reference line (degree 8)
  LOWER_Y:    138,   // y of lower reference line (degree 1)
  CHORD_Y:    175,   // y of chord symbol text
  STEM_LEN:    36,   // stem length in px
  NOTE_R:      12,   // notehead circle radius
  TS_X:        32,   // x centre for time signature numerals
  NOTE_START:  68,   // x where notes begin (after time sig)
  NOTE_START_NO_TS: 16, // x where notes begin when no time sig shown
};

const SPAN = L.LOWER_Y - L.UPPER_Y; // px between reference lines = 76

// Notehead geometry — tilted ellipse like standard notation
const NH = { RX: 11, RY: 7.5, ANGLE: -30 }; // rotate 30° counter-clockwise (right side up)
const NH_RAD = NH.ANGLE * Math.PI / 180;

// Returns the true rightmost (side=+1) or leftmost (side=-1) point on the
// rotated ellipse — where a vertical stem's outer edge meets the notehead edge.
function ellipseEdge(cx, cy, side) {
  const cosA = Math.cos(NH_RAD), sinA = Math.sin(NH_RAD);
  // Parameter t where dx/dt = 0 on the parametric rotated ellipse
  const t0 = Math.atan2(-NH.RY * sinA, NH.RX * cosA);
  const t  = side === 1 ? t0 : t0 + Math.PI;
  return {
    x: cx + NH.RX * Math.cos(t) * cosA - NH.RY * Math.sin(t) * sinA,
    y: cy + NH.RX * Math.cos(t) * sinA + NH.RY * Math.sin(t) * cosA,
  };
}

// Up stem (dir=-1) attaches at rightmost point; down stem at leftmost
function stemAttach(x, y, dir) {
  return ellipseEdge(x, y, dir === -1 ? 1 : -1);
}

function stemTipPt(attach, dir) {
  return { x: attach.x, y: attach.y + dir * L.STEM_LEN };
}

function noteY(degree, octaveShift) {
  // degree 1 → LOWER_Y, degree 8 → UPPER_Y, linear
  const base = L.LOWER_Y - ((degree - 1) / 7) * SPAN;
  return base - octaveShift * SPAN;
}

const BEAT_VAL = {
  whole: 4, minim: 2, crotchet: 1, quaver: 0.5, semiquaver: 0.25, demisemiquaver: 0.125
};

// Proportional beat-start layout.
// Every note sits at the x corresponding to its beat position — no centering.
// Two quavers therefore occupy the same horizontal span as one crotchet.
// areaLeft and areaWidth are passed in so chord symbols use the identical formula.
function layoutNotes(notes, ts, areaLeft, areaWidth) {
  let beat = 0;
  return notes.map(n => {
    const dur = BEAT_VAL[n.duration.base] * (n.duration.dots === 1 ? 1.5 : n.duration.dots === 2 ? 1.75 : 1);
    const x = areaLeft + (beat / ts.beats) * areaWidth;
    beat += dur;
    return { n, x, dur };
  });
}

// ── Drawing helpers ───────────────────────────────────────────────────────

function drawStem(svg, ax, ay, tipX, tipY) {
  svg.appendChild(el('line', {
    x1: ax, y1: ay, x2: tipX, y2: tipY,
    stroke: 'var(--fg)', 'stroke-width': 1.6, 'stroke-linecap': 'round'
  }));
}

function drawFlag(svg, tipX, tipY, dir) {
  // Filled tapered flag:
  //   • Vertical left edge at tipX — joins the stem flush
  //   • Thick (T px) at the stem-tip end, tapering to a point at the free curl
  //   • Outer bezier arcs away; inner bezier returns close to the stem
  const W = 15, H = 30, T = 7;
  const s = dir === -1 ? 1 : -1;
  const d = [
    `M ${tipX} ${tipY}`,
    // Outer curve: sweeps wide early, then curves to free tip
    `C ${tipX+W} ${tipY+s*H*0.15} ${tipX+W*0.75} ${tipY+s*H*0.55} ${tipX+4} ${tipY+s*H}`,
    // Inner curve: taper begins at ~50% height — pulled back much earlier than before
    `C ${tipX+W*0.55} ${tipY+s*H*0.48} ${tipX+W*0.55} ${tipY+s*T*1.1} ${tipX} ${tipY+s*T}`,
    `L ${tipX} ${tipY} Z`,
  ].join(' ');
  svg.appendChild(el('path', { d, fill: 'var(--fg)' }));
}

function drawNotehead(svg, x, y, duration, label) {
  const isWhole  = duration === 'whole';
  const isMinim  = duration === 'minim';
  const isHollow = isWhole || isMinim;

  svg.appendChild(el('ellipse', {
    cx: x, cy: y, rx: NH.RX, ry: NH.RY,
    fill: isHollow ? 'var(--bg)' : 'var(--note-fill)',
    stroke: 'var(--note-fill)', 'stroke-width': 1.8,
    transform: `rotate(${NH.ANGLE},${x},${y})`
  }));

  // Degree label — always upright, centred on notehead
  const textFill = isHollow ? 'var(--fg)' : 'var(--note-text)';
  svg.appendChild(el('text', {
    x, y,
    fill: textFill,
    'font-size': label.length > 2 ? '9' : '11.5',
    'font-weight': '700',
    'font-family': 'system-ui, sans-serif',
    'text-anchor': 'middle',
    'dominant-baseline': 'central',
  }, label));
}

function degreeLabel(degree, accidental) {
  const acc = accidental === 'flat' ? '♭' : accidental === 'sharp' ? '♯' : '';
  return acc + degree;
}

function stemDir(note) {
  if (note.stem === 'up')   return -1;
  if (note.stem === 'down') return  1;
  // auto: notes in upper half → stem down, lower half → stem up
  const eff = note.degree + (note.octaveShift ?? 0) * 7;
  return eff >= 4.5 ? 1 : -1;
}

// ── Rest symbols ──────────────────────────────────────────────────────────

function drawRest(svg, x, base) {
  const midY = (L.UPPER_Y + L.LOWER_Y) / 2;
  if (base === 'whole') {
    // Filled rectangle hanging from upper line
    svg.appendChild(el('rect', {
      x: x - 10, y: L.UPPER_Y, width: 20, height: 8,
      fill: 'var(--fg)', rx: 1
    }));
  } else if (base === 'minim') {
    // Open rectangle sitting on lower line
    svg.appendChild(el('rect', {
      x: x - 10, y: L.LOWER_Y - 8, width: 20, height: 8,
      fill: 'none', stroke: 'var(--fg)', 'stroke-width': 1.6, rx: 1
    }));
  } else if (base === 'crotchet') {
    // Simple squiggle approximation using a path
    const top = midY - 12;
    const d = `M ${x} ${top} l 5 6 l -8 5 l 8 4 l -5 6 l 6 -2`;
    svg.appendChild(el('path', { d, fill: 'none', stroke: 'var(--fg)', 'stroke-width': 1.6, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));
  } else if (base === 'quaver') {
    // Filled oval + flag-like tail
    svg.appendChild(el('ellipse', { cx: x, cy: midY, rx: 5, ry: 4, fill: 'var(--fg)', transform: `rotate(-20,${x},${midY})` }));
    svg.appendChild(el('line', { x1: x+4, y1: midY, x2: x+4, y2: midY - 20, stroke: 'var(--fg)', 'stroke-width': 1.5 }));
    const d = `M ${x+4} ${midY-20} C ${x+18} ${midY-14} ${x+12} ${midY-6} ${x+4} ${midY-4}`;
    svg.appendChild(el('path', { d, fill: 'none', stroke: 'var(--fg)', 'stroke-width': 1.5 }));
  } else {
    // fallback dash
    svg.appendChild(el('line', { x1: x-8, y1: midY, x2: x+8, y2: midY, stroke: 'var(--fg)', 'stroke-width': 2 }));
  }
}

// ── Main render function ──────────────────────────────────────────────────

function renderBar(bar, key, chordFormat, showTS = false, isLast = false, isRowEnd = false) {
  const ts = bar.timeSignature;
  const noteStart  = showTS ? L.NOTE_START : L.NOTE_START_NO_TS;
  // Note area: fixed left margin from barline so beat-1 is always at the same x,
  // and a small right margin so the last note doesn't crowd the barline.
  const NOTE_AREA_LEFT  = noteStart + 22;
  const NOTE_AREA_RIGHT = L.RIGHT - 18;
  const NOTE_AREA_W     = NOTE_AREA_RIGHT - NOTE_AREA_LEFT;
  const svg = el('svg', { viewBox: `0 0 ${L.W} ${L.H}`, xmlns: NS });

  // ── Reference lines — full SVG width so adjacent bars are seamless ────
  const dash = '10 7';
  svg.appendChild(el('line', { x1: 0, y1: L.UPPER_Y, x2: L.W, y2: L.UPPER_Y, stroke: 'var(--staff-line)', 'stroke-width': 1.4, 'stroke-dasharray': dash }));
  svg.appendChild(el('line', { x1: 0, y1: L.LOWER_Y, x2: L.W, y2: L.LOWER_Y, stroke: 'var(--staff-line)', 'stroke-width': 1.4, 'stroke-dasharray': dash }));

  // Reference line labels (first bar only, tucked just inside the left barline)
  if (showTS) {
    svg.appendChild(el('text', { x: 9, y: L.UPPER_Y - 5, fill: 'var(--label)', 'font-size': '9', 'text-anchor': 'middle', 'font-family': 'system-ui, sans-serif' }, '8'));
    svg.appendChild(el('text', { x: 9, y: L.LOWER_Y + 13, fill: 'var(--label)', 'font-size': '9', 'text-anchor': 'middle', 'font-family': 'system-ui, sans-serif' }, '1'));
  }

  // ── Barlines ───────────────────────────────────────────────────────────
  // Left barline on every bar (at SVG left edge → seamless with preceding bar's right edge)
  svg.appendChild(el('line', { x1: L.LEFT, y1: L.UPPER_Y - 12, x2: L.LEFT, y2: L.LOWER_Y + 12, stroke: 'var(--fg)', 'stroke-width': 1.8 }));
  // Right barline at the end of every system row; double barline on final bar
  if (isRowEnd) {
    svg.appendChild(el('line', { x1: L.RIGHT,     y1: L.UPPER_Y - 12, x2: L.RIGHT,     y2: L.LOWER_Y + 12, stroke: 'var(--fg)', 'stroke-width': 1.8 }));
    if (isLast) {
      svg.appendChild(el('line', { x1: L.RIGHT + 9, y1: L.UPPER_Y - 12, x2: L.RIGHT + 9, y2: L.LOWER_Y + 12, stroke: 'var(--fg)', 'stroke-width': 6 }));
    }
  }

  // ── Time signature (first bar or time-sig change only) ────────────────
  if (showTS) {
    const tsFontSize = Math.round(SPAN / 2 / 0.68);
    const tsStyle = `fill:var(--fg);font-size:${tsFontSize}px;font-weight:700;font-family:'EB Garamond',serif;text-anchor:middle;dominant-baseline:central;`;
    svg.appendChild(el('text', { x: L.TS_X, y: L.UPPER_Y + SPAN * 0.25, style: tsStyle }, String(ts.beats)));
    svg.appendChild(el('text', { x: L.TS_X, y: L.UPPER_Y + SPAN * 0.75, style: tsStyle }, String(ts.division)));
  }

  // ── Layout notes ───────────────────────────────────────────────────────
  const laid = layoutNotes(bar.notes, ts, NOTE_AREA_LEFT, NOTE_AREA_W);

  // ── Beams (drawn first, behind noteheads) ──────────────────────────────
  const beamGroups = {};
  laid.forEach(({ n, x }) => {
    if (n.beam && n.beam.groupId) {
      (beamGroups[n.beam.groupId] ??= []).push({ n, x });
    }
  });

  for (const members of Object.values(beamGroups)) {
    if (members.length < 2) continue;
    const dir = stemDir(members[0].n);

    const memberData = members.map(({ n, x }) => {
      const ny = noteY(n.degree, n.octaveShift);
      const attach = stemAttach(x, ny, dir);
      const tip = stemTipPt(attach, dir);
      return { attach, tip };
    });

    // Stems
    memberData.forEach(({ attach, tip }) => {
      svg.appendChild(el('line', {
        x1: attach.x, y1: attach.y, x2: tip.x, y2: tip.y,
        stroke: 'var(--fg)', 'stroke-width': 1.6, 'stroke-linecap': 'round'
      }));
    });

    // Beam bar — drawn as a filled parallelogram so end caps are vertical,
    // precisely flush with each stem rather than angled perpendicular to the beam slope
    const first = memberData[0], last = memberData[memberData.length - 1];
    const bh = 4.5;  // half-thickness of beam
    const sw = 0.8;  // half of stem stroke-width — beam overlaps stem outer edges
    const bd = `M ${first.tip.x - sw} ${first.tip.y - bh} L ${last.tip.x + sw} ${last.tip.y - bh} L ${last.tip.x + sw} ${last.tip.y + bh} L ${first.tip.x - sw} ${first.tip.y + bh} Z`;
    svg.appendChild(el('path', { d: bd, fill: 'var(--beam)' }));
  }

  // ── Notes and rests ────────────────────────────────────────────────────
  laid.forEach(({ n, x }) => {
    if (n.type === 'rest') {
      drawRest(svg, x, n.duration.base);
      return;
    }

    const y   = noteY(n.degree, n.octaveShift);
    const dir = stemDir(n);
    const lbl = degreeLabel(n.degree, n.accidental);
    const base = n.duration.base;
    const isBeamed = n.beam && n.beam.type !== null;

    // Notehead
    drawNotehead(svg, x, y, base, lbl);

    // Stem (skip for whole notes and beamed notes — beamed stems drawn above)
    if (base !== 'whole' && !isBeamed) {
      const attach = stemAttach(x, y, dir);
      const tip    = stemTipPt(attach, dir);
      drawStem(svg, attach.x, attach.y, tip.x, tip.y);
      // Flag for unbeamed quaver/semiquaver
      if (base === 'quaver' || base === 'semiquaver') {
        drawFlag(svg, tip.x, tip.y, dir);
      }
    }

    // Augmentation dots
    if (n.duration.dots > 0) {
      for (let d = 0; d < n.duration.dots; d++) {
        svg.appendChild(el('circle', { cx: x + NH.RX + 6 + d * 7, cy: y - 3, r: 2.5, fill: 'var(--fg)' }));
      }
    }

    // Ledger-line hint for notes outside the staff (subtle accent line)
    if (n.octaveShift !== 0) {
      const refY = n.octaveShift > 0 ? L.UPPER_Y : L.LOWER_Y;
      svg.appendChild(el('line', {
        x1: x - 18, y1: refY, x2: x + 18, y2: refY,
        stroke: 'var(--accent)', 'stroke-width': 1.2,
        'stroke-dasharray': '4 3', opacity: '0.55'
      }));
    }
  });

  // ── Tie arcs ───────────────────────────────────────────────────────────
  // Drawn as a filled lens (two quadratic beziers) — thick in the middle, tapering to points.
  laid.forEach(({ n, x }) => {
    if (n.type === 'rest' || !n.tie || !n.tie.type) return;
    const y    = noteY(n.degree, n.octaveShift ?? 0);
    const arcY = y + NH.RY + 5;
    let sx, ex;
    if (n.tie.type === 'start') { sx = x;        ex = L.W - 2; }
    else                        { sx = 2;         ex = x;      }
    const span = ex - sx;
    // Cubic bezier — symmetric lens: both outer and inner edges curve visibly,
    // tapering to sharp points at each end. Thickness concentrated at centre.
    const ox = span * 0.28;  // horizontal offset pulls control pts well inward
    const ob = 11;           // outer bulge depth (downward)
    const ib = 5;            // inner bulge depth — enough to see curvature at top too
    svg.appendChild(el('path', {
      d: [
        `M ${sx} ${arcY}`,
        `C ${sx+ox} ${arcY+ob} ${ex-ox} ${arcY+ob} ${ex} ${arcY}`,
        `C ${ex-ox} ${arcY+ib} ${sx+ox} ${arcY+ib} ${sx} ${arcY} Z`,
      ].join(' '),
      fill: 'var(--fg)', opacity: '0.75'
    }));
  });

  // ── Chord symbols ──────────────────────────────────────────────────────
  const chordFont = chordFormat === 'roman' ? "'EB Garamond', serif" : "system-ui, sans-serif";
  (bar.chordSymbols || []).forEach(chord => {
    // Same formula as note layout — beat-start, so chord aligns with its note
    const chordX = NOTE_AREA_LEFT + (chord.beatOffset / ts.beats) * NOTE_AREA_W;
    svg.appendChild(el('text', {
      x: chordX, y: L.CHORD_Y,
      fill: 'var(--chord)',
      'font-size': '18', 'font-weight': '700', 'font-style': 'normal',
      'font-family': chordFont, 'text-anchor': 'middle',
    }, formatChordSymbol(chord, chordFormat, key)));
  });

  return svg;
}

// ═══════════════════════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════════════════════

// Compute how many notes actually occupy horizontal space (notes, not rests,
// grouped by beam so a pair of beamed quavers counts as ~1.5 note-slots).
function noteDensity(bar) {
  let slots = 0;
  const seen = new Set();
  bar.notes.forEach(n => {
    if (n.type === 'rest') return;
    if (n.beam && n.beam.groupId) {
      if (!seen.has(n.beam.groupId)) { seen.add(n.beam.groupId); slots += 1.2; }
      else slots += 0.4;
    } else {
      slots += 1;
    }
  });
  return Math.max(1, slots);
}

// Group bars into system rows such that each bar gets at least MIN_PX_PER_SLOT px
// per note-slot, while fitting as many bars as possible per row.
function computeRows(bars, containerWidth) {
  const MIN_PX_PER_SLOT = 48;
  const MIN_BAR_WIDTH   = 160;

  const minWidths = bars.map(b =>
    Math.max(MIN_BAR_WIDTH, noteDensity(b) * MIN_PX_PER_SLOT)
  );

  const rows = [];
  let row = [], rowW = 0;
  for (let i = 0; i < bars.length; i++) {
    if (row.length > 0 && rowW + minWidths[i] > containerWidth) {
      rows.push(row);
      row = [];
      rowW = 0;
    }
    row.push(i);
    rowW += minWidths[i];
  }
  if (row.length) rows.push(row);
  return rows;
}

// ═══════════════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════════════

let state = { key: 'G', format: 'nashville', theme: 'light' };

function render() {
  const wrap = document.getElementById('scoreWrap');
  wrap.innerHTML = '';

  const containerWidth = wrap.clientWidth || window.innerWidth || 640;
  const rows = computeRows(DOC.bars, containerWidth);

  rows.forEach(rowIndices => {
    const rowEl = document.createElement('div');
    rowEl.className = 'score-row';

    rowIndices.forEach((barIdx, posInRow) => {
      const bar    = DOC.bars[barIdx];
      const isLast = barIdx === DOC.bars.length - 1;
      const isRowEnd = posInRow === rowIndices.length - 1;
      const prev   = DOC.bars[barIdx - 1];
      const showTS = barIdx === 0 || !prev ||
        bar.timeSignature.beats    !== prev.timeSignature.beats ||
        bar.timeSignature.division !== prev.timeSignature.division;

      const barWrap = document.createElement('div');
      barWrap.appendChild(renderBar(bar, state.key, state.format, showTS, isLast, isRowEnd));
      rowEl.appendChild(barWrap);
    });

    wrap.appendChild(rowEl);
  });

  document.getElementById('songTitle').textContent = DOC.title;
  document.getElementById('keyLabel').textContent = `Key of ${state.key}`;
}

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('keySelect').addEventListener('change', e => {
  state.key = e.target.value;
  render();
});

document.getElementById('formatSelect').addEventListener('change', e => {
  state.format = e.target.value;
  render();
});

document.getElementById('themeBtn').addEventListener('click', () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.body.dataset.theme = state.theme === 'dark' ? 'dark' : '';
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? 'Light' : 'Dark';
});

// ── Boot ───────────────────────────────────────────────────────────────────
render();

// Re-layout when container width changes (portrait↔landscape, resize, etc.)
let _resizeTimer;
new ResizeObserver(() => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(render, 60);
}).observe(document.getElementById('scoreWrap'));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
