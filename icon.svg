<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#1a1a2e"/>
  <!-- Two reference lines -->
  <line x1="12" y1="35" x2="88" y2="35" stroke="#c084fc" stroke-width="2.5" stroke-dasharray="7,5"/>
  <line x1="12" y1="65" x2="88" y2="65" stroke="#c084fc" stroke-width="2.5" stroke-dasharray="7,5"/>
  <!-- Scale degree numbers as noteheads -->
  <circle cx="28" cy="55" r="10" fill="#e8e8e8"/>
  <text x="28" y="59" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#1a1a2e">3</text>
  <circle cx="52" cy="44" r="10" fill="#e8e8e8"/>
  <text x="52" y="48" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#1a1a2e">5</text>
  <circle cx="74" cy="35" r="10" fill="#e8e8e8"/>
  <text x="74" y="39" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#1a1a2e">1</text>
  <!-- Stems -->
  <line x1="28" y1="45" x2="28" y2="22" stroke="#e8e8e8" stroke-width="1.5"/>
  <line x1="52" y1="34" x2="52" y2="22" stroke="#e8e8e8" stroke-width="1.5"/>
  <!-- Beam -->
  <line x1="28" y1="22" x2="52" y2="22" stroke="#e8e8e8" stroke-width="3.5" stroke-linecap="square"/>
  <line x1="74" y1="25" x2="74" y2="14" stroke="#e8e8e8" stroke-width="1.5"/>
</svg>
